# Manual Windows build workflow.
#
# Trigger: workflow_dispatch only. No push/PR triggers to avoid accidental
# releases while the project is pre-1.0.

name: Build Windows Installer

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Package installer
        run: npm run dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: mithnah-installer
          path: dist/electron-builder/*.exe
          retention-days: 7
          if-no-files-found: error
